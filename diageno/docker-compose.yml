# ═══════════════════════════════════════════════════════
# Diageno — Docker Compose (full local stack)
# ═══════════════════════════════════════════════════════

services:
  # ── Postgres + pgvector ───────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: diageno
      POSTGRES_PASSWORD: diageno
      POSTGRES_DB: diageno
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diageno"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (object store) ──────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # ── MLflow ────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    command: >
      mlflow server
        --backend-store-uri postgresql://diageno:diageno@postgres:5432/diageno
        --default-artifact-root s3://mlflow/
        --host 0.0.0.0
        --port 5000
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  # ── FastAPI Inference API ─────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      POSTGRES_DSN: postgresql://diageno:diageno@postgres:5432/diageno
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DATA_DIR: /data
    ports:
      - "8000:8000"
    volumes:
      - app_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Streamlit UI ──────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api

  # ── ETL Runner ────────────────────────────────────
  etl:
    build:
      context: .
      dockerfile: Dockerfile.etl
    environment:
      POSTGRES_DSN: postgresql://diageno:diageno@postgres:5432/diageno
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DATA_DIR: /data
    volumes:
      - app_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - etl  # Only run on demand: docker compose --profile etl run etl

  # ── Prometheus ────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.1
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerting_rules.yml:/etc/prometheus/alerting_rules.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  # ── Grafana ───────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.3
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  # ── Alertmanager ──────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml

  # ── n8n (workflow orchestration) ──────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: admin
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  pgdata:
  minio_data:
  app_data:
  prometheus_data:
  grafana_data:
  n8n_data:
