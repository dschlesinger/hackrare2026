---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: diageno
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/alerting_rules.yml
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
      - job_name: diageno-api
        metrics_path: /metrics
        scrape_interval: 10s
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["diageno"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
  alerting_rules.yml: |
    groups:
      - name: diageno
        rules:
          - alert: APIDown
            expr: up{job="diageno-api"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Diageno API is down"
          - alert: HighErrorRate
            expr: sum(rate(diageno_api_requests_total{status=~"5.."}[5m])) / sum(rate(diageno_api_requests_total[5m])) > 0.05
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "API error rate > 5%"
          - alert: SlowResponses
            expr: histogram_quantile(0.95, rate(diageno_api_request_duration_seconds_bucket[5m])) > 5
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "API p95 > 5s"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: diageno
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.50.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=30d"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: diageno
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: ["pods", "endpoints", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: diageno
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: diageno
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
