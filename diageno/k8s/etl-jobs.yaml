---
# ETL Pipeline Jobs — run sequentially
apiVersion: batch/v1
kind: Job
metadata:
  name: download-bronze
  namespace: diageno
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: etl
          image: diageno-etl:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "diageno.etl.download_bronze"]
          envFrom:
            - configMapRef:
                name: diageno-env
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data-pvc
