---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: diageno
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.11.1
          command: ["mlflow", "server"]
          args:
            - "--backend-store-uri"
            - "postgresql://diageno:diageno@postgres:5432/diageno"
            - "--default-artifact-root"
            - "s3://mlflow/"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "5000"
          env:
            - name: MLFLOW_S3_ENDPOINT_URL
              value: "http://minio:9000"
            - name: AWS_ACCESS_KEY_ID
              value: minioadmin
            - name: AWS_SECRET_ACCESS_KEY
              value: minioadmin
          ports:
            - containerPort: 5000
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: diageno
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
