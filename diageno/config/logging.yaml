version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  json:
    format: '{"ts":"%(asctime)s","level":"%(levelname)s","logger":"%(name)s","msg":"%(message)s"}'

handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    formatter: json
    filename: /tmp/diageno.log
    maxBytes: 10485760
    backupCount: 3

loggers:
  diageno:
    level: INFO
    handlers: [console, file]
    propagate: false
  uvicorn:
    level: INFO
    handlers: [console]
  sqlalchemy.engine:
    level: WARNING
    handlers: [console]

root:
  level: WARNING
  handlers: [console]
