# Alertmanager configuration
global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "service"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 5m

receivers:
  - name: "default"
    # For demo: just log. In production, add webhook/email/slack.
    webhook_configs: []

  - name: "critical"
    # For demo: log. Add PagerDuty / Slack in production.
    webhook_configs: []
